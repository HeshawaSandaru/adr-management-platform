services:
  mongo:
    image: mongo:7
    container_name: adr-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: adr-backend
    restart: always
    ports:
      - "5000:3000"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/adr_db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: adr-frontend
    ports:
      - "5173:5173"

volumes:
  mongo_data: